<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JARVIS — Dashboard Fábrica de Criativos TT Shop IA">
    <title>JARVIS — Fábrica de Criativos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-bg: #0a0e27;
            --dark-secondary: #1a1f3a;
            --dark-tertiary: #2a2f4a;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-tertiary: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #0f1535 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body.light-mode {
            --dark-bg: #f8fafc;
            --dark-secondary: #f1f5f9;
            --dark-tertiary: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-tertiary: #64748b;
            --border: #cbd5e1;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* HEADER */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            margin-bottom: 40px;
        }

        body.light-mode header {
            background: rgba(248, 250, 252, 0.95);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .theme-toggle {
            width: 50px;
            height: 30px;
            background: var(--dark-tertiary);
            border: 1px solid var(--border);
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 2px;
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            border-color: var(--accent-blue);
        }

        .theme-toggle-circle {
            width: 26px;
            height: 26px;
            background: var(--accent-blue);
            border-radius: 50%;
            transition: transform 0.3s;
        }

        body.light-mode .theme-toggle-circle {
            transform: translateX(20px);
        }

        /* LAYOUT */
        .layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (max-width: 1024px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }

        /* SIDEBAR */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--dark-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .card:hover {
            border-color: var(--accent-blue);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.1);
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: var(--dark-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: var(--dark-bg);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(59, 130, 246, 0.3);
        }

        .button.secondary {
            background: var(--dark-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .button.secondary:hover {
            border-color: var(--accent-purple);
        }

        /* MAIN CONTENT */
        .main {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* KANBAN */
        .kanban {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .kanban-column {
            background: var(--dark-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }

        .kanban-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .kanban-items {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .kanban-item {
            background: var(--dark-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid var(--accent-blue);
        }

        .kanban-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.2);
            border-color: var(--accent-cyan);
        }

        .kanban-item-id {
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
            font-size: 13px;
        }

        .kanban-item-produto {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 8px;
        }

        .kanban-item-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge.alta {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .badge.media {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .badge.baixa {
            background: rgba(59, 130, 246, 0.2);
            color: var(--accent-blue);
        }

        .empty {
            text-align: center;
            color: var(--text-tertiary);
            padding: 40px 20px;
            font-size: 12px;
        }

        /* MÉTRICAS */
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .metric-card {
            background: linear-gradient(135deg, var(--dark-secondary) 0%, var(--dark-tertiary) 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s;
        }

        .metric-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-4px);
        }

        .metric-value {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .metric-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--dark-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
        }

        .modal-close {
            font-size: 28px;
            cursor: pointer;
            color: var(--text-tertiary);
            transition: all 0.2s;
            background: none;
            border: none;
            padding: 0;
        }

        .modal-close:hover {
            color: var(--text-primary);
            transform: rotate(90deg);
        }

        .copy-box {
            background: var(--dark-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin: 16px 0;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-x: auto;
        }

        .info-box {
            background: rgba(59, 130, 246, 0.1);
            border-left: 3px solid var(--accent-blue);
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .success-box {
            background: rgba(16, 185, 129, 0.1);
            border-left: 3px solid var(--success);
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }

            header {
                margin-bottom: 24px;
            }

            .header-content {
                padding: 0 12px;
            }

            .logo {
                font-size: 20px;
            }

            .card {
                padding: 16px;
            }

            .kanban {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-content">
            <div class="logo">🚀 JARVIS</div>
            <button class="theme-toggle" onclick="toggleTheme()">
                <div class="theme-toggle-circle"></div>
            </button>
        </div>
    </header>

    <!-- CONTAINER -->
    <div class="container">
        <!-- LAYOUT -->
        <div class="layout">
            <!-- SIDEBAR -->
            <div class="sidebar">
                <div class="card">
                    <h2>📝 Nova Referência</h2>

                    <div class="form-group">
                        <label>ID</label>
                        <input type="text" id="refId" placeholder="REF-004" value="REF-">
                    </div>

                    <div class="form-group">
                        <label>Link</label>
                        <input type="url" id="refLink" placeholder="https://instagram.com/reel/...">
                    </div>

                    <div class="form-group">
                        <label>Produto</label>
                        <input type="text" id="refProduto" placeholder="Método TT Shop IA" value="Método TT Shop IA">
                    </div>

                    <div class="form-group">
                        <label>Público</label>
                        <input type="text" id="refPublico" placeholder="Iniciantes em TikTok Shop">
                    </div>

                    <div class="form-group">
                        <label>Oferta</label>
                        <textarea id="refOferta" placeholder="R$197 à vista ou 12x de R$49 + 7 dias"></textarea>
                    </div>

                    <div class="form-group">
                        <label>CTA</label>
                        <select id="refCta">
                            <option>Saiba Mais</option>
                            <option>Acesse</option>
                            <option>Compre</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Prioridade</label>
                        <select id="refPrioridade">
                            <option>Alta</option>
                            <option>Média</option>
                            <option>Baixa</option>
                        </select>
                    </div>

                    <button class="button" onclick="submeterReferencia()">📤 PROCESSAR</button>
                    <button class="button secondary" onclick="limparFormulario()">🔄 Limpar</button>
                </div>
            </div>

            <!-- MAIN -->
            <div class="main">
                <!-- KANBAN -->
                <div class="card">
                    <h2>📊 Kanban — Status dos Criativos</h2>
                    <div class="kanban">
                        <div class="kanban-column">
                            <div class="kanban-title">🔵 Entrada</div>
                            <div class="kanban-items" id="col-entrada"></div>
                        </div>
                        <div class="kanban-column">
                            <div class="kanban-title">🟡 Análise</div>
                            <div class="kanban-items" id="col-analise"></div>
                        </div>
                        <div class="kanban-column">
                            <div class="kanban-title">🟠 Copy</div>
                            <div class="kanban-items" id="col-copy"></div>
                        </div>
                        <div class="kanban-column">
                            <div class="kanban-title">🔴 QA</div>
                            <div class="kanban-items" id="col-qa"></div>
                        </div>
                        <div class="kanban-column">
                            <div class="kanban-title">🟣 Produção</div>
                            <div class="kanban-items" id="col-producao"></div>
                        </div>
                    </div>
                </div>

                <!-- MÉTRICAS -->
                <div class="card">
                    <h2>📈 Métricas</h2>
                    <div class="metrics">
                        <div class="metric-card">
                            <div class="metric-value" id="metric-total">0</div>
                            <div class="metric-label">Processados</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-value" id="metric-aprovados">0</div>
                            <div class="metric-label">Aprovados</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-value" id="metric-qa">—</div>
                            <div class="metric-label">Score QA</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-value" id="metric-velocidade">—</div>
                            <div class="metric-label">Velocidade</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-titulo">Detalhes</h2>
                <button class="modal-close" onclick="fecharModal()">&times;</button>
            </div>
            <div id="modal-corpo"></div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'jarvis-criativos-v2';

        function obterDados() {
            const dados = localStorage.getItem(STORAGE_KEY);
            return dados ? JSON.parse(dados) : {};
        }

        function salvarDados(dados) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(dados));
            renderizar();
        }

        function submeterReferencia() {
            const refId = document.getElementById('refId').value.trim();
            const refLink = document.getElementById('refLink').value.trim();
            const refProduto = document.getElementById('refProduto').value.trim();
            const refPublico = document.getElementById('refPublico').value.trim();

            if (!refId || !refLink || !refProduto || !refPublico) {
                alert('❌ Preencha todos os campos obrigatórios!');
                return;
            }

            const dados = obterDados();
            dados[refId] = {
                id: refId,
                link: refLink,
                produto: refProduto,
                publico: refPublico,
                oferta: document.getElementById('refOferta').value.trim(),
                cta: document.getElementById('refCta').value,
                prioridade: document.getElementById('refPrioridade').value,
                status: 'entrada',
                dataCriacao: new Date().toLocaleString('pt-BR'),
                copy: null,
                score: null
            };

            salvarDados(dados);
            limparFormulario();

            alert(`✅ ${refId} criada!\n\n💬 Mande para o Jarvis:\n"processar ${refId}"`);
        }

        function limparFormulario() {
            document.getElementById('refId').value = 'REF-';
            document.getElementById('refLink').value = '';
            document.getElementById('refProduto').value = 'Método TT Shop IA';
            document.getElementById('refPublico').value = '';
            document.getElementById('refOferta').value = '';
            document.getElementById('refPrioridade').value = 'Alta';
        }

        function renderizar() {
            const dados = obterDados();
            const colunas = { entrada: [], analise: [], copy: [], qa: [], producao: [] };

            Object.values(dados).forEach(item => {
                colunas[item.status || 'entrada'].push(item);
            });

            Object.keys(colunas).forEach(coluna => {
                const elemento = document.getElementById(`col-${coluna}`);
                if (colunas[coluna].length === 0) {
                    elemento.innerHTML = '<div class="empty">—</div>';
                } else {
                    elemento.innerHTML = colunas[coluna]
                        .map(item => `
                            <div class="kanban-item" onclick="abrirModal('${item.id}')">
                                <div class="kanban-item-id">${item.id}</div>
                                <div class="kanban-item-produto">${item.produto}</div>
                                <div class="kanban-item-meta">
                                    <span class="badge ${item.prioridade.toLowerCase()}">${item.prioridade}</span>
                                    ${item.score ? `<span class="badge alta">${item.score}pts</span>` : ''}
                                </div>
                            </div>
                        `)
                        .join('');
                }
            });

            // Métricas
            const total = Object.keys(dados).length;
            const aprovados = Object.values(dados).filter(i => i.status === 'producao').length;
            const comScore = Object.values(dados).filter(i => i.score);
            const scoreMedia = comScore.length > 0 ? Math.round(comScore.reduce((a, i) => a + i.score, 0) / comScore.length) : '—';

            document.getElementById('metric-total').textContent = total;
            document.getElementById('metric-aprovados').textContent = aprovados;
            document.getElementById('metric-qa').textContent = scoreMedia;
        }

        function abrirModal(refId) {
            const dados = obterDados();
            const item = dados[refId];

            const corpo = `
                <div class="info-box">
                    Para mover para próxima etapa, envie a copy para o Jarvis aqui no chat.
                </div>

                <h3 style="margin-bottom: 12px;">Dados da Referência</h3>
                <div class="copy-box">ID: ${item.id}
Produto: ${item.produto}
Público: ${item.publico}
Link: ${item.link}
Prioridade: ${item.prioridade}</div>

                ${item.copy ? `
                    <h3 style="margin: 20px 0 12px 0;">Copy Aprovada</h3>
                    <div class="success-box">✅ Score: ${item.score}/100</div>
                    <div class="copy-box">${item.copy}</div>
                ` : '<div class="info-box">⏳ Aguardando processamento...</div>'}
            `;

            document.getElementById('modal-titulo').textContent = `${item.id} — ${item.produto}`;
            document.getElementById('modal-corpo').innerHTML = corpo;
            document.getElementById('modal').classList.add('active');
        }

        function fecharModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }

        // Inicializar
        window.addEventListener('load', () => {
            const tema = localStorage.getItem('theme');
            if (tema === 'light') document.body.classList.add('light-mode');
            renderizar();
        });

        // Fechar modal ao clicar fora
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') fecharModal();
        });
    </script>
</body>
</html>
